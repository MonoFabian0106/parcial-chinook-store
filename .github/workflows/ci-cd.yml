name: CI-CD

on:
  push:
    branches:
      - '**'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run backend unit tests
        run: pytest -q

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests
        run: npm run test

  deploy-backend:
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, deploy-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend
        run: |
          cd ~/environment/parcial-chinook-store
          git pull origin main
          cd backend
          pip install -r requirements.txt
          sudo systemctl restart chinook-backend

  deploy-frontend:
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, frontend-ec2]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy frontend
        run: |
          cd /opt/parcial-chinook-store
          git pull origin main
          cd frontend
          npm ci
          npm run build
          sudo systemctl restart chinook-frontend