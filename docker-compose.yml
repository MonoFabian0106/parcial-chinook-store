services:
  db:
    image: postgres:16
    container_name: chinook_db
    environment:
      POSTGRES_USER: chinook
      POSTGRES_PASSWORD: chinookpass
      POSTGRES_DB: chinook
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data: