name: CI-CD

on:
  push:
    branches:
      - '**'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run backend unit tests
        run: pytest -q

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests
        run: npm run test

  deploy:
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ${{ secrets.BACKEND_EC2_USER }}
          key: ${{ secrets.BACKEND_EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/parcial-chinook-store
            git pull origin main
            cd backend
            pip install -r requirements.txt
            sudo systemctl restart chinook-backend

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy frontend to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FRONTEND_EC2_HOST }}
          username: ${{ secrets.FRONTEND_EC2_USER }}
          key: ${{ secrets.FRONTEND_EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/parcial-chinook-store
            git pull origin main
            cd frontend
            npm ci
            npm run build
            sudo systemctl restart chinook-frontend
